name: NPM

on:
  push:

jobs:
  echo-stuff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Cache PNPM install and Turbo
        uses: ./.github/actions/cache-setup
      - name: Build
        run: pnpm build

      - name: Echo pnpm config list
        run: pnpm config list
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
      - name: Publish React Provider
        # run: pnpm --filter @monerium/sdk-react-provider pub:pre
        run: pnpm publish --filter @monerium/sdk-react-provider --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
